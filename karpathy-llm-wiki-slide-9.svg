<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="url(#ctaGrad)"/>
  
  <text x="540" y="200" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">
    GET STARTED
  </text>
  
  <rect x="140" y="280" width="800" height="100" rx="20" fill="#1E1E2E"/>
  <text x="540" y="330" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    1. Share karpathy's llm-wiki.md with your LLM agent
  </text>
  <text x="540" y="365" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#888888">
    (Claude Code, OpenCode, Codex, etc.)
  </text>
  
  <rect x="140" y="410" width="800" height="100" rx="20" fill="#1E1E2E"/>
  <text x="540" y="460" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    2. Set up Obsidian as your wiki layer
  </text>
  <text x="540" y="495" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#888888">
    (or any markdown folder)
  </text>
  
  <rect x="140" y="540" width="800" height="100" rx="20" fill="#1E1E2E"/>
  <text x="540" y="590" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    3. Drop your first source &amp; start building
  </text>
  <text x="540" y="625" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#888888">
    The wiki compounds with every addition
  </text>
  
  <text x="540" y="780" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">
    The wiki keeps getting richer
  </text>
  <text x="540" y="830" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#888888">
    Knowledge compiled once • Kept current • Always ready
  </text>
  
  <!-- CTA -->
  <rect x="190" y="920" width="700" height="100" rx="50" fill="url(#ctaGrad)"/>
  <text x="540" y="975" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">
    Follow @devengoratela for more
  </text>
  
  <text x="540" y="1100" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#888888">
    Save this post for later ↗
  </text>
  <text x="540" y="1140" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#888888">
    Share with someone who needs this →
  </text>
