<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#FF6B35"/>
  
  <text x="540" y="120" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">
    SPECIAL FILES
  </text>
  
  <!-- index.md -->
  <rect x="60" y="200" width="440" height="340" rx="20" fill="#1E1E2E"/>
  <text x="280" y="250" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#FF6B35">
    index.md
  </text>
  <text x="280" y="300" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">
    Content catalog
  </text>
  <text x="280" y="340" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    Every page listed with
  </text>
  <text x="280" y="370" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    link, one-line summary,
  </text>
  <text x="280" y="400" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    metadata (date, source count)
  </text>
  <text x="280" y="460" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#888888">
    LLM reads to find relevant pages
  </text>
  <text x="280" y="490" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#666666">
    Works at moderate scale (~100 sources)
  </text>
  
  <!-- log.md -->
  <rect x="580" y="200" width="440" height="340" rx="20" fill="#1E1E2E"/>
  <text x="800" y="250" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#FF6B35">
    log.md
  </text>
  <text x="800" y="300" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">
    Append-only timeline
  </text>
  <text x="800" y="340" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    Records: ingests, queries,
  </text>
  <text x="800" y="370" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    lint passes — what happened
  </text>
  <text x="800" y="420" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#888888">
    Prefix format: ## [2026-04-02]
  </text>
  <text x="800" y="450" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#888888">
    grepable with unix tools
  </text>
  <text x="800" y="480" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#666666">
    git log --oneline for wiki evolution
  </text>
</svg>