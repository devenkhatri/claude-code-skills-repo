<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg2)"/>
  <circle cx="540" cy="675" r="400" fill="url(#accent3)" opacity="0.08"/>
  <text x="540" y="180" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#ffffff" text-anchor="middle">WHY THIS MATTERS</text>
  <rect x="290" y="210" width="500" height="4" rx="2" fill="url(#accent3)" opacity="0.5"/>
  <text x="540" y="350" font-family="Arial, sans-serif" font-size="36" fill="#e2e8f0" text-anchor="middle">AI coding assistants are</text>
  <text x="540" y="410" font-family="Arial, sans-serif" font-size="36" fill="#e2e8f0" text-anchor="middle">reshaping how we write code.</text>
  <text x="540" y="500" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">But not all assistants are created equal.</text>
  <rect x="140" y="580" width="800" height="200" rx="20" fill="#1e293b" stroke="url(#accent3)" stroke-width="2"/>
  <text x="540" y="650" font-family="Arial Black, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">The difference could cost you</text>
  <text x="540" y="710" font-family="Arial Black, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">hours every week.</text>
  <text x="540" y="930" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">Let's break it down.</text>
  <text x="540" y="1200" font-family="Arial, sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Swipe to see the comparison →</text>
</svg>