<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#FF6B35"/>
  
  <text x="540" y="120" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">
    THREE
  </text>
  <text x="540" y="175" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">
    OPERATIONS
  </text>
  
  <!-- Ingest -->
  <rect x="60" y="240" width="440" height="320" rx="20" fill="#1E1E2E"/>
  <text x="280" y="290" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#FF6B35">
    INGEST
  </text>
  <text x="280" y="340" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Drop new source
  </text>
  <text x="280" y="370" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    LLM reads it
  </text>
  <text x="280" y="400" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Updates wiki pages
  </text>
  <text x="280" y="430" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Adds cross-references
  </text>
  <text x="280" y="460" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Updates index &amp; log
  </text>
  <text x="280" y="510" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#888888">
    1 source → 10-15 pages
  </text>
  
  <!-- Query -->
  <rect x="580" y="240" width="440" height="320" rx="20" fill="#1E1E2E"/>
  <text x="800" y="290" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#FF6B35">
    QUERY
  </text>
  <text x="800" y="340" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Ask questions
  </text>
  <text x="800" y="370" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    against the wiki
  </text>
  <text x="800" y="420" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#AAAAAA">
    Output: markdown, tables,
  </text>
  <text x="800" y="448" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#AAAAAA">
    slides, charts...
  </text>
  <text x="800" y="490" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#888888">
    Good answers → file back!
  </text>
  
  <!-- Lint -->
  <rect x="60" y="600" width="960" height="180" rx="20" fill="#1E1E2E"/>
  <text x="540" y="650" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#FF6B35">
    LINT (Health Check)
  </text>
  <text x="540" y="700" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#FFFFFF">
    Periodically audit the wiki:
  </text>
  <text x="540" y="740" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    Contradictions • Stale claims • Orphan pages • Missing links • Data gaps
  </text>
  <text x="540" y="770" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#AAAAAA">
    LLM suggests new questions &amp; sources to investigate
  </text>
</svg>