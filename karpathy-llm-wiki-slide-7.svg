<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#FF6B35"/>
  
  <text x="540" y="120" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">
    WHY IT WORKS
  </text>
  
  <rect x="60" y="200" width="960" height="160" rx="20" fill="#1E1E2E"/>
  <text x="540" y="250" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">
    Humans abandon wikis because:
  </text>
  <text x="540" y="300" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#AAAAAA">
    Maintenance burden grows faster than value
  </text>
  <text x="540" y="340" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#AAAAAA">
    Cross-references, updates, contradictions...
  </text>
  
  <rect x="60" y="400" width="960" height="180" rx="20" fill="#1E1E2E" stroke="#FF6B35" stroke-width="3"/>
  <text x="540" y="450" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="700" fill="#FF6B35">
    LLMs don't get bored
  </text>
  <text x="540" y="500" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#FFFFFF">
    ✓ Don't forget to update cross-references
  </text>
  <text x="540" y="540" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#FFFFFF">
    ✓ Can touch 15 files in one pass
  </text>
  <text x="540" y="580" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#FFFFFF">
    ✓ Maintenance cost ≈ near zero
  </text>
  
  <text x="540" y="720" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">
    Division of Labor
  </text>
  
  <rect x="60" y="770" width="440" height="120" rx="16" fill="#2A2A4A"/>
  <text x="280" y="810" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#FF6B35">
    HUMAN
  </text>
  <text x="280" y="850" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Curate sources • Ask questions
  </text>
  <text x="280" y="875" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Think about what it means
  </text>
  
  <rect x="580" y="770" width="440" height="120" rx="16" fill="#2A2A4A"/>
  <text x="800" y="810" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#FF6B35">
    LLM
  </text>
  <text x="800" y="850" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Summarizing • Cross-referencing
  </text>
  <text x="800" y="875" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#FFFFFF">
    Filing • Bookkeeping
  </text>
  
  <text x="540" y="1020" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#666666">
    Related to Vannevar Bush's Memex (1945)
  </text>
</svg>