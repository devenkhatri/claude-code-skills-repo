<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#FF6B35"/>
  
  <text x="540" y="120" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">
    3-LAYER
  </text>
  <text x="540" y="180" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">
    ARCHITECTURE
  </text>
  
  <!-- Layer 1 -->
  <rect x="100" y="260" width="880" height="140" rx="16" fill="#2A2A4A"/>
  <text x="540" y="310" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#FF6B35">
    LAYER 1: RAW SOURCES
  </text>
  <text x="540" y="360" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#AAAAAA">
    Your curated collection of articles, papers, PDFs
  </text>
  <text x="540" y="385" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#AAAAAA">
    Immutable — LLM reads, never modifies
  </text>
  
  <!-- Layer 2 -->
  <rect x="100" y="440" width="880" height="160" rx="16" fill="#3A3A5A"/>
  <text x="540" y="490" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#FF6B35">
    LAYER 2: THE WIKI
  </text>
  <text x="540" y="540" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#FFFFFF">
    LLM-generated markdown files
  </text>
  <text x="540" y="568" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#FFFFFF">
    Summaries, entity pages, concepts, cross-references
  </text>
  <text x="540" y="596" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#FFFFFF">
    LLM creates, updates, maintains — you read
  </text>
  
  <!-- Layer 3 -->
  <rect x="100" y="640" width="880" height="160" rx="16" fill="#4A4A6A"/>
  <text x="540" y="690" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#FF6B35">
    LAYER 3: THE SCHEMA
  </text>
  <text x="540" y="740" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#FFFFFF">
    CLAUDE.md / AGENTS.md
  </text>
  <text x="540" y="768" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#AAAAAA">
    Tells LLM how wiki is structured, conventions, workflows
  </text>
  <text x="540" y="796" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#AAAAAA">
    The key config that makes it disciplined
  </text>
  
  <text x="540" y="920" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#888888">
    Obsidian = IDE | LLM = Programmer | Wiki = Codebase
  </text>
</svg>