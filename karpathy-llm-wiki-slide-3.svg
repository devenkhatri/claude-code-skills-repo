<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="8" fill="#FF6B35"/>
  
  <text x="540" y="140" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF">
    THE CORE IDEA
  </text>
  <text x="540" y="210" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#FF6B35">
    LLM builds a persistent wiki
  </text>
  
  <rect x="60" y="280" width="960" height="280" rx="24" fill="#1E1E2E"/>
  <text x="540" y="330" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">
    Instead of retrieving at query time...
  </text>
  <text x="540" y="390" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#AAAAAA">
    The LLM incrementally builds &amp; maintains
  </text>
  <text x="540" y="430" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#AAAAAA">
    a structured markdown wiki
  </text>
  <text x="540" y="480" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#AAAAAA">
    between you and raw sources
  </text>
  
  <rect x="60" y="600" width="960" height="280" rx="24" fill="#1E1E2E" stroke="#FF6B35" stroke-width="3"/>
  <text x="540" y="650" text-anchor="middle" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="700" fill="#FF6B35">
    When you add a source:
  </text>
  <text x="540" y="710" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#FFFFFF">
    ✓ Reads &amp; extracts key info
  </text>
  <text x="540" y="760" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#FFFFFF">
    ✓ Updates existing pages
  </text>
  <text x="540" y="810" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#FFFFFF">
    ✓ Flags contradictions
  </text>
  <text x="540" y="860" text-anchor="middle" font-family="SF Pro Text, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#FFFFFF">
    ✓ Maintains cross-references
  </text>
</svg>